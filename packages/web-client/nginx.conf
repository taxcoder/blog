worker_processes  2;
error_log /usr/share/nginx/logs/error.log;

events {
    worker_connections  1024;
}

http {
    #设置编码格式，默认是俄语格式，可以改为utf-8
    charset utf-8;

    # 文件扩展名与类型映射表
    include       mime.types;
    # 默认文件类型
    default_type  application/octet-stream;
    # 设置日志模式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    # Nginx访问日志存放位置
    access_log  /usr/share/nginx/logs/access.log main;
    types_hash_max_size 2048;

     #实现文件零拷贝
    sendfile        on;
    #在开启了sendfile的情况下，合并请求后统⼀发送给客⼾端
    tcp_nopush      on;
     #在开启了keepalived模式下的连接是否启⽤TCP_NODELAY选项，当为off时，延迟0.2s发送，默认On时，不延迟发送，⽴即发送⽤⼾相应报⽂
    tcp_nodelay     on;
    #设置会话保持时间，0表示禁止长连接，默认为75s，通常配置在http字段作为站点全局配置
    keepalive_timeout 65 65;
    #在一次长连接上所允许请求的资源的最大数量，默认为100次，建议适当调大，比如：500
    #开启长连接后，返回客户端的会话保持时间为60s，单次长连接累计请求达到指定次数请求或65秒就会被断开，后面的65是发送给客户端响应报文头部中显示的超时时间，如果不设置客户端将不显示超时时间。
    keepalive_requests 20;

    server_names_hash_bucket_size 128;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 32k;
    #设置允许客户端上传单个文件的最大值，默认值为1m，上传文件超过此值会出现413错误
    client_max_body_size 20m;
     #用于接收每个客户端请求报文的body部分的缓冲大小。默认为16K。超出此大小时，其将被暂存到磁盘上的由下面client_body_temp_path指令所定义的位置
    client_body_buffer_size 4m;
    #设定存储客户端请求报文的body部分的临时存储路径及子目录结构和数量，目录名为16进制的数字，使用hash之后的值从后往前截取1位、2位、2位作为目录名。
    client_body_temp_path path;

    #是否在响应报文的server首部显示nginx版本，off表示不显示，默认值为on
    server_tokens off;
    # 开启gzip压缩
    gzip  on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_http_version 1.0;
    gzip_comp_level 2;
    gzip_types text/plain application/javascript text/css application/xml image/x-icon application/json font/ttf
    font/otf image/svg+xml font/woff font/woff2;
    gzip_disable "MSIE [1-6]\.";
    gzip_static on;
    gzip_vary on;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=hot_cache:10m inactive=60m;

    server {
        listen 443 ssl http2;
        server_name www.recall.top;
        # 使用certificates
        ssl_certificate_key  /usr/share/nginx/acme.sh/recall.top/*.recall.top.key;
        ssl_certificate /usr/share/nginx/acme.sh/recall.top/fullchain.cer;
        # S缓存ssl 减少tls握手的交互次数
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 5m;

        ssl_prefer_server_ciphers On;

        if ($host = 'recall.top') {
           rewrite ^/(.*)$ https://www.recall.com/$1 permanent;
        }

        if ($host = 'admin.recall.top') {
           rewrite ^/(.*)$ https://www.recall.com/$1 permanent;
        }

        root /usr/share/nginx/html;

        location / {
            # 使用名为nginx_cache的缓存空间
            proxy_cache hot_cache;
            # 对于200、206、304、301、302状态码的数据缓存1天
            proxy_cache_valid 200 206 304 301 302 1d;
            # 对于其他状态的数据缓存30分钟
            proxy_cache_valid any 30m;
            # 定义生成缓存键的规则（请求的url+参数作为key）
            proxy_cache_key $host$uri$is_args$args;
            # 资源至少被重复访问三次后再加入缓存
            proxy_cache_min_uses 3;
            # 出现重复请求时，只让一个去后端读数据，其他的从缓存中读取
            proxy_cache_lock on;
            # 上面的锁超时时间为3s，超过3s未获取数据，其他请求直接去后端
            proxy_cache_lock_timeout 3s;
            # 对于请求参数或cookie中声明了不缓存的数据，不再加入缓存
            proxy_no_cache $cookie_nocache $arg_nocache $arg_comment;
            # 在响应头中添加一个缓存是否命中的状态（便于调试）
            add_header Cache-status $upstream_cache_status;
            # 禁止访问的ip地址
            deny 127.0.0.1;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

         location ~* \.(jpg|jpeg|png|gif|css|js)$ {
            expires 30d;
            add_header Cache-Control "public";
            add_header Pragma public;
            access_log off;
            etag off;
        }

        location ~* ^.+\.(eot|otf|woff|svg|ttf|woff2)$ {
            access_log  off;
            expires max;
        }

        location ^~ /api/ {
           proxy_pass http://8.137.33.225$request_uri;
        }

        location ^~ /auth/ {
           proxy_pass http://8.137.33.225$request_uri;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    server {
        listen 80;
        server_name  recall.top www.recall.top;

        return 301 https://www.recall.top$request_uri;
    }
}